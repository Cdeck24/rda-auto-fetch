name: Daily Score Fetch
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install hashids

      - name: Run Fetch Script
        run: node fetch-scores.js
